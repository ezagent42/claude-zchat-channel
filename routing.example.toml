# routing.toml — zchat channel-server V4 路由配置
#
# 将此文件复制为 routing.toml（与 server.py 同目录），
# 或通过环境变量 CS_ROUTING_CONFIG 指定路径，例如：
#   CS_ROUTING_CONFIG=/etc/zchat/routing.toml
#
# 由 zchat CLI 写入 / bridge 动态写入。
# 由 channel-server 启动时加载。

# ── channels ─────────────────────────────────────────────
# 每个 channel 对应一个 IRC 频道。
# channel_id 就是 IRC 频道名（不含 #）。

[channels.general]
# 纯 IRC channel，不绑定飞书。所有 agent 默认加入。
agents = { primary = "alice-agent0" }

[channels."conv-001"]
# 绑定飞书客户群：消息双向转发。
external_chat_id = "oc_客户群A"
agents = { fast = "alice-fast0", deep = "alice-deep0" }

[channels."conv-002"]
external_chat_id = "oc_客户群B"
agents = { fast = "alice-fast1" }

# ── operators ────────────────────────────────────────────
# 可选：operator 元数据（供 bridge 查询）。

[operators.alice]
nick = "alice"
