# Pre-release 飞书 E2E 配置模板
# 真实 chat_id 需要替换

feishu:
  app_id: ${FEISHU_APP_ID}
  app_secret: ${FEISHU_APP_SECRET}

groups:
  # customer_chat 由 GroupManager 动态管理（bot 被拉入群时注册）
  # 以下是 load_config() 需要的 key
  admin_chat_id: "oc_885883b976c16911366a75006d4a8dd6"     # cs-admin
  squad_chats:
    - chat_id: "oc_ee40c7c69521c7a30184b9d5b1ce2736"       # cs-squad
      name: "cs-squad"

# customer chat_id 用于 FeishuTestClient 直接发消息
test:
  customer_chat_id: "oc_3e33d9eddc980a800c3eefa01c6ca0f7"  # cs-customer

channel_server:
  url: "ws://localhost:9999"

# 测试环境 timer 缩短（正式环境为 180s/300s/3600s）
timers:
  takeover_wait: 10
  idle_timeout: 12
  close_timeout: 30
